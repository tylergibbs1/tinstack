name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-arm64
          - bun-darwin-x64
          - bun-windows-x64
        include:
          - target: bun-linux-x64
            name: tinstack-linux-x64
          - target: bun-linux-arm64
            name: tinstack-linux-arm64
          - target: bun-darwin-arm64
            name: tinstack-darwin-arm64
          - target: bun-darwin-x64
            name: tinstack-darwin-x64
          - target: bun-windows-x64
            name: tinstack-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-macos-app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          cd TinstackApp
          xcodebuild -project TinstackApp.xcodeproj \
            -scheme TinstackApp \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH=$(find TinstackApp/build -name "TinstackApp.app" -type d | head -1)
          cd $(dirname "$APP_PATH")
          zip -r TinstackApp-macos.zip TinstackApp.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinstackApp-macos.zip
          path: TinstackApp/build/**/TinstackApp-macos.zip

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  release:
    needs: [build-binaries, build-macos-app, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Binaries
          cp artifacts/tinstack-linux-x64/tinstack-linux-x64 release/
          cp artifacts/tinstack-linux-arm64/tinstack-linux-arm64 release/
          cp artifacts/tinstack-darwin-arm64/tinstack-darwin-arm64 release/
          cp artifacts/tinstack-darwin-x64/tinstack-darwin-x64 release/
          cp artifacts/tinstack-windows-x64.exe/tinstack-windows-x64.exe release/
          # macOS app
          find artifacts -name "TinstackApp-macos.zip" -exec cp {} release/ \;
          # Make binaries executable
          chmod +x release/tinstack-*
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/tinstack-linux-x64
            release/tinstack-linux-arm64
            release/tinstack-darwin-arm64
            release/tinstack-darwin-x64
            release/tinstack-windows-x64.exe
            release/TinstackApp-macos.zip
            release/checksums.txt
          body: |
            ## Tinstack ${{ github.ref_name }}

            Lightweight AWS local emulator — 158 services, single binary, ~20ms startup.

            ### Downloads

            | Platform | Binary | Size |
            |----------|--------|------|
            | macOS (Apple Silicon) | `tinstack-darwin-arm64` | ~59MB |
            | macOS (Intel) | `tinstack-darwin-x64` | ~59MB |
            | Linux (x64) | `tinstack-linux-x64` | ~59MB |
            | Linux (ARM64) | `tinstack-linux-arm64` | ~59MB |
            | Windows (x64) | `tinstack-windows-x64.exe` | ~59MB |
            | macOS App (GUI) | `TinstackApp-macos.zip` | ~5MB |

            ### Quick Start

            ```bash
            # Download and run
            chmod +x tinstack-darwin-arm64
            ./tinstack-darwin-arm64

            # Or with Docker
            docker compose up
            ```

            Point your AWS SDK at `http://localhost:4566` with any credentials.

            ### macOS App

            Download `TinstackApp-macos.zip`, unzip, and drag to Applications.
            Right-click and select "Open" on first launch to bypass Gatekeeper.
