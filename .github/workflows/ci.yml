name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun run build

      - name: Verify binary starts
        run: |
          ./tinstack &
          sleep 2
          curl -s http://localhost:4566/ | grep -q "ListAllMyBucketsResult"
          echo "Binary health check passed"
          kill %1

  build-macos-app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          cd TinstackApp
          xcodebuild -project TinstackApp.xcodeproj \
            -scheme TinstackApp \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build
