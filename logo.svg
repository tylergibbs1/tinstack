<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tin-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6db3d3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tin-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d8ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tin-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9cb8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a8ca8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloud-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cheek" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3b3;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff9999;stop-opacity:0.4" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2a6f8a" flood-opacity="0.25"/>
    </filter>
    <filter id="inner-glow">
      <feDropShadow dx="0" dy="-2" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Tin can body (main cylinder) -->
  <g filter="url(#shadow)">
    <!-- Can body -->
    <rect x="136" y="180" width="240" height="220" rx="16" fill="url(#tin-body)" stroke="#4a8ca8" stroke-width="3"/>

    <!-- Bottom rim (ellipse for 3D effect) -->
    <ellipse cx="256" cy="400" rx="120" ry="18" fill="url(#tin-dark)" stroke="#4a8ca8" stroke-width="3"/>

    <!-- Stack lines (the "stack" in tinstack) -->
    <rect x="136" y="260" width="240" height="4" rx="2" fill="#4a8ca8" opacity="0.3"/>
    <rect x="136" y="320" width="240" height="4" rx="2" fill="#4a8ca8" opacity="0.3"/>

    <!-- Top rim (ellipse) -->
    <ellipse cx="256" cy="180" rx="120" ry="18" fill="url(#tin-top)" stroke="#4a8ca8" stroke-width="3"/>

    <!-- Lid / top surface -->
    <ellipse cx="256" cy="180" rx="100" ry="14" fill="url(#tin-top)" opacity="0.5"/>

    <!-- Shine highlight on body -->
    <rect x="152" y="195" width="24" height="180" rx="12" fill="white" opacity="0.15"/>

    <!-- Label area on can -->
    <rect x="160" y="235" width="192" height="100" rx="10" fill="white" opacity="0.12"/>

    <!-- Stack layer icons inside label -->
    <!-- Layer 1: small rect -->
    <rect x="192" y="252" width="128" height="14" rx="4" fill="white" opacity="0.25"/>
    <!-- Layer 2: small rect -->
    <rect x="192" y="274" width="128" height="14" rx="4" fill="white" opacity="0.2"/>
    <!-- Layer 3: small rect -->
    <rect x="192" y="296" width="128" height="14" rx="4" fill="white" opacity="0.15"/>
  </g>

  <!-- Cute face -->
  <g>
    <!-- Left eye -->
    <ellipse cx="220" cy="350" rx="14" ry="16" fill="#2a5a6a"/>
    <!-- Left eye shine -->
    <ellipse cx="214" cy="344" rx="5" ry="6" fill="white" opacity="0.8"/>

    <!-- Right eye -->
    <ellipse cx="292" cy="350" rx="14" ry="16" fill="#2a5a6a"/>
    <!-- Right eye shine -->
    <ellipse cx="286" cy="344" rx="5" ry="6" fill="white" opacity="0.8"/>

    <!-- Smile -->
    <path d="M 232 372 Q 256 394 280 372" stroke="#2a5a6a" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Left cheek blush -->
    <ellipse cx="196" cy="368" rx="16" ry="10" fill="url(#cheek)"/>

    <!-- Right cheek blush -->
    <ellipse cx="316" cy="368" rx="16" ry="10" fill="url(#cheek)"/>
  </g>

  <!-- Cloud floating above the can -->
  <g transform="translate(256, 120)" filter="url(#inner-glow)">
    <!-- Main cloud body -->
    <circle cx="0" cy="0" r="36" fill="url(#cloud-fill)" stroke="#b8dce8" stroke-width="2"/>
    <circle cx="-30" cy="8" r="26" fill="url(#cloud-fill)" stroke="#b8dce8" stroke-width="2"/>
    <circle cx="30" cy="8" r="26" fill="url(#cloud-fill)" stroke="#b8dce8" stroke-width="2"/>
    <circle cx="-18" cy="-16" r="22" fill="url(#cloud-fill)" stroke="#b8dce8" stroke-width="2"/>
    <circle cx="18" cy="-16" r="22" fill="url(#cloud-fill)" stroke="#b8dce8" stroke-width="2"/>
    <!-- Cloud cover (hide internal strokes) -->
    <ellipse cx="0" cy="6" rx="52" ry="28" fill="url(#cloud-fill)"/>
    <!-- Cloud bottom -->
    <ellipse cx="0" cy="18" rx="48" ry="12" fill="url(#cloud-fill)"/>

    <!-- Tiny arrow pointing down from cloud to can -->
    <line x1="0" y1="32" x2="0" y2="48" stroke="#6db3d3" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 4"/>
  </g>

  <!-- Small sparkles around the can -->
  <!-- Sparkle 1 -->
  <g transform="translate(110, 240)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#ffdd57" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffdd57" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Sparkle 2 -->
  <g transform="translate(400, 200)">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#ffdd57" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#ffdd57" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Sparkle 3 -->
  <g transform="translate(390, 340)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffdd57" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#ffdd57" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
